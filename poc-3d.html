<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Torres Alianza — Escenario Desierto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    #info { position: absolute; top: 10px; left: 10px; color: #fff; font-size: 13px; background: rgba(0,0,0,0.7); padding: 10px 14px; border-radius: 6px; line-height: 1.5; }
  </style>
</head>
<body>
  <div id="info">Torres Alianza — Escenario Desierto<br>Arrastra para rotar la vista</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0dca0);
    scene.fog = new THREE.Fog(0xf0dca0, 50, 130);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 300);
    camera.position.set(0, 46, 48);
    camera.lookAt(0, 0, -6);

    const canvas = document.createElement('canvas');
    document.body.appendChild(canvas);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;

    // luz contenida a proposito: por encima de ~1.2 en total los tonos de
    // arena se saturan a blanco y el camino deja de distinguirse del suelo
    const sun = new THREE.DirectionalLight(0xfff2d0, 0.85);
    sun.position.set(25, 40, 15);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    Object.assign(sun.shadow.camera, { left: -50, right: 50, top: 50, bottom: -50 });
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xfff0d5, 0.35));

    function toonMat(color, extra) { return new THREE.MeshToonMaterial(Object.assign({ color }, extra || {})); }
    function addOutline(mesh, color, scale) {
      const outline = new THREE.Mesh(mesh.geometry, new THREE.MeshBasicMaterial({ color: color || 0x201a14, side: THREE.BackSide }));
      outline.scale.multiplyScalar(scale || 1.08);
      mesh.add(outline);
    }

    // ---------- terreno con dunas (desplazamiento de vértices) ----------
    function mulberry32(seed) {
      return function () {
        seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    const rng = mulberry32(2024);
    const W = 80, H = 45;

    // el camino se define antes que el terreno para poder aplanar la
    // arena a su alrededor (si no, las dunas lo tapaban por el medio)
    const pathPts2D = [[-40, 15], [-24, 15], [-12, 10], [0, 4], [12, 4], [22, 8], [32, 15], [40, 15]];
    function sampleAt(t) {
      const segCount = pathPts2D.length - 1;
      const segF = t * segCount;
      const i = Math.min(segCount - 1, Math.floor(segF));
      const f = segF - i;
      const [x1, y1] = pathPts2D[i], [x2, y2] = pathPts2D[i + 1];
      return [x1 + (x2 - x1) * f, y1 + (y2 - y1) * f];
    }
    function distToPath(x, y) {
      let best = Infinity;
      for (let i = 0; i <= 40; i++) {
        const [px, py] = sampleAt(i / 40);
        best = Math.min(best, Math.hypot(x - px, y - py));
      }
      return best;
    }
    function heightAt(x, y) {
      const duneH = Math.sin(x * 0.15 + 1.3) * 0.5 + Math.sin(y * 0.22 + x * 0.08) * 0.35;
      const flat = Math.min(1, distToPath(x, y) / 6);
      return duneH * flat;
    }

    const geo = new THREE.PlaneGeometry(W, H, 40, 24);
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      // el plano se gira -90° en X, asi que el vertice local (x, y) acaba en el
      // mundo en (x, -y). Sin ese signo se aplanaba el reflejo del camino y las
      // dunas seguian intactas justo debajo de el.
      pos.setZ(i, heightAt(pos.getX(i), -pos.getY(i)));
    }
    geo.computeVertexNormals();
    const terrain = new THREE.Mesh(geo, toonMat(0xd9bc7a));
    terrain.rotation.x = -Math.PI / 2;
    terrain.receiveShadow = true;
    scene.add(terrain);

    // parches de arena más clara/oscura para dar variedad (como el arte 2D)
    for (let i = 0; i < 10; i++) {
      const patchGeo = new THREE.CircleGeometry(4 + rng() * 6, 12);
      const patch = new THREE.Mesh(patchGeo, toonMat(i % 2 ? 0xc49e5a : 0xe8cc8c, { transparent: true, opacity: 0.35 }));
      patch.rotation.x = -Math.PI / 2;
      patch.position.set((rng() - 0.5) * W, 0.03, (rng() - 0.5) * H);
      scene.add(patch);
    }

    // ---------- camino (franja plana), con borde oscuro + relleno para que
    // destaque sobre la arena (antes casi del mismo tono, se perdía) ----------
    function buildRibbon(halfW, heightOffset, color) {
      const steps = 60;
      const left = [], right = [];
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const [x, y] = sampleAt(t);
        const [xn, yn] = sampleAt(Math.min(1, t + 0.01));
        const dx = xn - x, dy = yn - y, len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len, ny = dx / len;
        // la altura se mide en cada borde, no en el centro: si se usa la del
        // centro, el lateral queda enterrado alli donde el terreno sube
        const lx = x + nx * halfW, lz = y + ny * halfW;
        const rx = x - nx * halfW, rz = y - ny * halfW;
        left.push(lx, heightAt(lx, lz) + heightOffset, lz);
        right.push(rx, heightAt(rx, rz) + heightOffset, rz);
      }
      const verts = [];
      for (let i = 0; i <= steps; i++) {
        verts.push(left[i * 3], left[i * 3 + 1], left[i * 3 + 2]);
        verts.push(right[i * 3], right[i * 3 + 1], right[i * 3 + 2]);
      }
      const idx = [];
      for (let i = 0; i < steps; i++) {
        const a = i * 2, b = a + 1, c = a + 2, d = a + 3;
        idx.push(a, b, c, b, d, c);
      }
      const geo3 = new THREE.BufferGeometry();
      geo3.setAttribute("position", new THREE.Float32BufferAttribute(verts, 3));
      geo3.setIndex(idx);
      geo3.computeVertexNormals();
      const mesh = new THREE.Mesh(geo3, toonMat(color, { side: THREE.DoubleSide }));
      mesh.receiveShadow = true;
      return mesh;
    }
    // margen pequeno: el terreno ya esta aplanado bajo el camino, solo hay que
    // salvar el error de interpolacion de la malla (2 unidades por celda)
    scene.add(buildRibbon(2.1, 0.14, 0x6b5236));  // borde oscuro, marca el contorno
    scene.add(buildRibbon(1.75, 0.17, 0x9a7f5c)); // relleno gris-marrón, contrasta con la arena

    // ---------- rocas ----------
    function makeRock(scale) {
      const g = new THREE.Group();
      const rock = 0x9d8768;
      const geo2 = new THREE.DodecahedronGeometry(0.6 * scale, 0);
      geo2.scale(1, 0.7, 0.85);
      const mesh = new THREE.Mesh(geo2, toonMat(rock));
      mesh.position.y = 0.35 * scale;
      mesh.rotation.y = Math.random() * Math.PI;
      mesh.castShadow = true; mesh.receiveShadow = true;
      addOutline(mesh, 0x3d2f1a, 1.06);
      g.add(mesh);
      return g;
    }

    // ---------- cactus tipo saguaro ----------
    function makeCactus(scale) {
      const g = new THREE.Group();
      const green = 0x5c8f4e;
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16 * scale, 0.2 * scale, 1.6 * scale, 8), toonMat(green));
      trunk.position.y = 0.8 * scale; trunk.castShadow = true; addOutline(trunk, 0x2d4a26);
      g.add(trunk);
      for (const side of [-1, 1]) {
        const armH = 0.7 * scale;
        const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.11 * scale, 0.13 * scale, armH, 6), toonMat(green));
        arm.position.set(side * 0.28 * scale, 0.9 * scale, 0);
        arm.rotation.z = side * 0.5;
        arm.castShadow = true; addOutline(arm, 0x2d4a26);
        g.add(arm);
        const armUp = new THREE.Mesh(new THREE.CylinderGeometry(0.1 * scale, 0.11 * scale, 0.5 * scale, 6), toonMat(green));
        armUp.position.set(side * 0.5 * scale, 1.3 * scale, 0);
        armUp.castShadow = true; addOutline(armUp, 0x2d4a26);
        g.add(armUp);
      }
      const tip = new THREE.Mesh(new THREE.SphereGeometry(0.17 * scale, 8, 8), toonMat(green));
      tip.position.y = 1.6 * scale; addOutline(tip, 0x2d4a26);
      g.add(tip);
      return g;
    }

    // ---------- palmera (para el oasis) ----------
    function makePalm(scale) {
      const g = new THREE.Group();
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12 * scale, 0.2 * scale, 2.2 * scale, 6), toonMat(0x9d7a4a));
      trunk.position.y = 1.1 * scale;
      trunk.rotation.z = 0.12;
      trunk.castShadow = true; addOutline(trunk, 0x4a3320);
      g.add(trunk);
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const frond = new THREE.Mesh(new THREE.ConeGeometry(0.22 * scale, 1.1 * scale, 4), toonMat(0x4e8f4a));
        frond.position.set(Math.cos(a) * 0.1 * scale, 2.25 * scale, Math.sin(a) * 0.1 * scale);
        frond.rotation.x = Math.PI / 2.2;
        frond.rotation.y = a;
        addOutline(frond, 0x2d4a26);
        g.add(frond);
      }
      return g;
    }

    // ---------- charca del oasis ----------
    function makeOasisPool(radius) {
      const pool = new THREE.Mesh(new THREE.CircleGeometry(radius, 20), toonMat(0x4fa9d9, { transparent: true, opacity: 0.9 }));
      pool.rotation.x = -Math.PI / 2;
      pool.position.y = 0.07;
      addOutline(pool, 0x2e7fb0, 1.03);
      return pool;
    }

    // dispersar rocas y cactus evitando el camino
    function farFromPath(x, y, minD) {
      for (let i = 0; i <= 20; i++) {
        const [px, py] = sampleAt(i / 20);
        if (Math.hypot(x - px, y - py) < minD) return false;
      }
      return true;
    }
    for (let i = 0; i < 22; i++) {
      const x = (rng() - 0.5) * (W - 6), y = (rng() - 0.5) * (H - 6);
      if (!farFromPath(x, y, 5)) continue;
      const isRock = rng() > 0.45;
      const obj = isRock ? makeRock(0.8 + rng() * 0.9) : makeCactus(0.8 + rng() * 0.6);
      obj.position.set(x, 0, y);
      obj.rotation.y = rng() * Math.PI * 2;
      scene.add(obj);
    }

    // pequeño oasis en una esquina
    const oasisX = 24, oasisY = -12;
    scene.add(makeOasisPool(3.2), );
    const pool = makeOasisPool(3.2);
    pool.position.set(oasisX, 0.07, oasisY);
    scene.add(pool);
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * Math.PI * 2;
      const palm = makePalm(1.1 + rng() * 0.3);
      palm.position.set(oasisX + Math.cos(a) * 3.6, 0, oasisY + Math.sin(a) * 3.6);
      scene.add(palm);
    }

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    let isDragging = false, lastX = 0, lastY = 0, angle = 0.3, elevation = 46;
    document.addEventListener('mousedown', (e) => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      angle += (e.clientX - lastX) * 0.005;
      elevation = Math.max(15, Math.min(70, elevation + (e.clientY - lastY) * 0.2));
      lastX = e.clientX; lastY = e.clientY;
      const r = 60;
      camera.position.x = Math.sin(angle) * r;
      camera.position.z = Math.cos(angle) * r * 0.7;
      camera.position.y = elevation;
      camera.lookAt(0, 0, -6);
    });
    document.addEventListener('mouseup', () => isDragging = false);

    animate();
  </script>
</body>
</html>
